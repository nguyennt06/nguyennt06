<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#020617"/>
        <stop offset="100%" stop-color="#03140c"/>
      </linearGradient>

      <linearGradient id="borderGlow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
        <stop offset="50%" stop-color="#22c55e" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#22c55e" stop-opacity="0.15"/>
      </linearGradient>

      <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22c55e" flood-opacity="0.85"/>
        <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#16a34a" flood-opacity="0.45"/>
      </filter>

      <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
        <path d="M32 0H0V32" stroke="#22c55e" stroke-opacity="0.08" stroke-width="1"/>
      </pattern>

      <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
        <rect width="8" height="4" fill="#22c55e" fill-opacity="0.025"/>
      </pattern>

      <style>
        .title {
          font-family: 'Courier New', Courier, monospace;
          font-size: 64px;
          font-weight: 700;
          letter-spacing: 1px;
        }
        .small {
          font-family: 'Courier New', Courier, monospace;
          font-size: 22px;
          fill: #4ade80;
          opacity: 0.9;
        }
      </style>
    </defs>

    <rect width="1200" height="320" rx="20" fill="url(#bg)"/>
    <rect width="1200" height="320" rx="20" fill="url(#grid)"/>
    <rect width="1200" height="320" rx="20" fill="url(#scanlines)"/>

    <rect x="14" y="14" width="1172" height="292" rx="14" stroke="url(#borderGlow)" stroke-width="2"/>

    <circle cx="52" cy="42" r="6" fill="#22c55e" fill-opacity="0.95"/>
    <circle cx="74" cy="42" r="6" fill="#84cc16" fill-opacity="0.85"/>
    <circle cx="96" cy="42" r="6" fill="#15803d" fill-opacity="0.75"/>

    <text x="60" y="88" class="small">$ whoami</text>
    <text x="60" y="140" class="title" fill="#86efac" filter="url(#textGlow)">Nguyễn Tuấn Nguyên</text>

    <text x="60" y="198" class="small">&gt; role: student, intern cyber security</text>
    <text x="60" y="230" class="small">&gt; focus: web pentest</text>
    <text x="60" y="262" class="small">&gt; status: online_</text>

    <rect x="60" y="278" width="1080" height="2" fill="#22c55e" fill-opacity="0.18"/>
  </svg>
